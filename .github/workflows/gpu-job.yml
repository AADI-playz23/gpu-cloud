name: GPU Job Runner

on:
  repository_dispatch:
    types: [run-gpu-job]

jobs:
  run-on-kaggle:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Authenticate Kaggle
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Inject job payload into notebook metadata
        run: |
          JOB_ID="${{ github.event.client_payload.job_id }}"
          GPU_TYPE="${{ github.event.client_payload.gpu_type }}"
          INPUT_DATA='${{ toJson(github.event.client_payload.input) }}'

          # Write kernel metadata — picks GPU from payload
          cat > notebook/kernel-metadata.json << EOF
          {
            "id": "${{ secrets.KAGGLE_USERNAME }}/gpu-cloud-worker",
            "title": "gpu-cloud-worker",
            "code_file": "worker.ipynb",
            "language": "python",
            "kernel_type": "notebook",
            "is_private": false,
            "enable_gpu": true,
            "enable_tpu": false,
            "enable_internet": true,
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF

          # Pass job data as environment comment in notebook
          python scripts/inject_payload.py "$JOB_ID" "$INPUT_DATA"

      - name: Push notebook to Kaggle
        run: kaggle kernels push -p ./notebook

      - name: Poll until complete
        id: poll
        run: |
          KERNEL_SLUG="${{ secrets.KAGGLE_USERNAME }}/gpu-cloud-worker"
          for i in $(seq 1 120); do
            STATUS=$(kaggle kernels status $KERNEL_SLUG | grep -oP '(?<=status )\S+')
            echo "Attempt $i — status: $STATUS"
            if [ "$STATUS" = "complete" ]; then
              echo "status=complete" >> $GITHUB_OUTPUT
              break
            elif [ "$STATUS" = "error" ]; then
              echo "status=error" >> $GITHUB_OUTPUT
              exit 1
            fi
            sleep 30
          done

      - name: Download output
        if: steps.poll.outputs.status == 'complete'
        run: |
          kaggle kernels output ${{ secrets.KAGGLE_USERNAME }}/gpu-cloud-worker -p ./output

      - name: Push result back to database
        if: steps.poll.outputs.status == 'complete'
        run: |
          python scripts/push_result.py \
            "${{ github.event.client_payload.job_id }}" \
            "./output" \
            "${{ secrets.DB_URL }}"

      - name: Upload logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-${{ github.event.client_payload.job_id }}-logs
          path: ./output
          retention-days: 7
