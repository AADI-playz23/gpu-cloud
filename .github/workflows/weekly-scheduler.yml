name: Weekly GPU Scheduler

on:
  schedule:
    # Run 1: Monday 00:05 UTC (5 min after quota reset)
    - cron: '5 0 * * 1'
    # Run 2: Wednesday 12:00 UTC
    - cron: '0 12 * * 3'
    # Reserve: Friday 18:00 UTC (manual trigger only — this cron just checks)
    - cron: '0 18 * * 5'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force start even if quota is low'
        required: false
        default: 'false'

jobs:
  schedule-run:
    runs-on: ubuntu-latest
    steps:
      - name: Check quota before starting
        id: quota_check
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"quota_check\",
              \"internal_token\": \"${{ secrets.INTERNAL_TOKEN }}\"
            }")

          echo "Quota response: $RESPONSE"

          USED=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('used_minutes', 9999))")
          STATUS=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('notebook_status','offline'))")

          echo "used_minutes=$USED" >> $GITHUB_OUTPUT
          echo "notebook_status=$STATUS" >> $GITHUB_OUTPUT

          # Safe to start if: offline AND < 1740 mins used (29 hrs, leaving 1hr buffer)
          if [ "$STATUS" = "offline" ] && [ "$USED" -lt "1740" ]; then
            echo "should_start=true" >> $GITHUB_OUTPUT
            echo "OK to start: $USED mins used, status $STATUS"
          else
            echo "should_start=false" >> $GITHUB_OUTPUT
            echo "SKIP: $USED mins used, status $STATUS"
          fi

      - name: Reset quota on Monday run
        if: steps.quota_check.outputs.should_start == 'true'
        run: |
          # Only reset on Monday (cron day 1)
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ]; then
            echo "Monday reset — clearing weekly quota"
            curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
              -H "Content-Type: application/json" \
              -d "{
                \"action\": \"weekly_reset\",
                \"internal_token\": \"${{ secrets.INTERNAL_TOKEN }}\"
              }"
          fi

      - name: Trigger notebook launch
        if: steps.quota_check.outputs.should_start == 'true' || github.event.inputs.force_run == 'true'
        run: |
          echo "Triggering notebook launch..."
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
            -d '{"event_type":"launch-notebook","client_payload":{"gpu_type":"p100"}}'
          echo "Launch dispatched"

      - name: Skip message
        if: steps.quota_check.outputs.should_start == 'false' && github.event.inputs.force_run != 'true'
        run: |
          echo "Skipping launch — notebook already running or quota near limit"
          echo "Status: ${{ steps.quota_check.outputs.notebook_status }}"
          echo "Used: ${{ steps.quota_check.outputs.used_minutes }} / 1800 minutes"
