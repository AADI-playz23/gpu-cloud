name: Watchdog

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Poll DB and process queue
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          echo "=== Watchdog tick $(date -u) ==="

          RESPONSE=$(curl -s -X POST "$SITE_URL/queue.php" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"watchdog_tick\",\"internal_token\":\"$INTERNAL_TOKEN\"}")

          echo "Response: $RESPONSE"

          echo "$RESPONSE" | jq -r '.new_assignments[]? | "\(.slot_id):\(.user_id)"' | while IFS=: read -r SLOT_ID USER_ID; do
            echo "Assigning slot $SLOT_ID to user $USER_ID"
            curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d "{\"event_type\":\"assign-slot\",\"client_payload\":{\"slot_id\":$SLOT_ID,\"user_id\":\"$USER_ID\"}}"
          done

          echo "$RESPONSE" | jq -r '.freed_slots[]?' | while read -r SLOT_ID; do
            echo "Slot $SLOT_ID freed - checking queue"
            NEXT=$(curl -s -X POST "$SITE_URL/queue.php" \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"get_next_queued\",\"internal_token\":\"$INTERNAL_TOKEN\",\"slot_id\":$SLOT_ID}")

            NEXT_USER=$(echo "$NEXT" | jq -r '.user_id // empty')

            if [ -n "$NEXT_USER" ]; then
              echo "Promoting $NEXT_USER to slot $SLOT_ID"
              curl -s -X POST \
                -H "Authorization: token $GH_PAT" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
                -d "{\"event_type\":\"assign-slot\",\"client_payload\":{\"slot_id\":$SLOT_ID,\"user_id\":\"$NEXT_USER\"}}"
            else
              echo "Queue empty - slot $SLOT_ID stays free"
            fi
          done

  notebook-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if notebook should auto-start
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          INTERNAL_TOKEN: ${{ secrets.INTERNAL_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          RESPONSE=$(curl -s -X POST "$SITE_URL/queue.php" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"should_start_notebook\",\"internal_token\":\"$INTERNAL_TOKEN\"}")

          echo "Scheduler check: $RESPONSE"

          SHOULD=$(echo "$RESPONSE" | jq -r '.should_start')

          echo "Should start: $SHOULD"

          if [ "$SHOULD" = "true" ]; then
            echo "Triggering notebook launch..."
            curl -s -X POST \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d "{\"event_type\":\"launch-notebook\",\"client_payload\":{\"gpu_type\":\"p100\"}}"
            echo "Launch triggered"
          fi
