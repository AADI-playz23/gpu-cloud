name: Watchdog

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Poll DB and process queue
        run: |
          echo "=== Watchdog tick $(date -u) ==="

          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"watchdog_tick\",\"internal_token\":\"${{ secrets.INTERNAL_TOKEN }}\"}")

          echo "Response: $RESPONSE"

          cat > /tmp/parse_assignments.py << 'PYEOF'
import sys, json
data = json.loads(sys.stdin.read())
for a in data.get("new_assignments", []):
    print(str(a["slot_id"]) + ":" + str(a["user_id"]))
PYEOF

          cat > /tmp/parse_freed.py << 'PYEOF'
import sys, json
data = json.loads(sys.stdin.read())
for s in data.get("freed_slots", []):
    print(s)
PYEOF

          cat > /tmp/parse_next.py << 'PYEOF'
import sys, json
data = json.loads(sys.stdin.read())
print(data.get("user_id") or "")
PYEOF

          ASSIGNMENTS=$(echo "$RESPONSE" | python3 /tmp/parse_assignments.py 2>/dev/null || true)

          for ENTRY in $ASSIGNMENTS; do
            SLOT_ID=$(echo "$ENTRY" | cut -d: -f1)
            USER_ID=$(echo "$ENTRY" | cut -d: -f2)
            echo "Assigning slot $SLOT_ID to user $USER_ID"
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d "{\"event_type\":\"assign-slot\",\"client_payload\":{\"slot_id\":$SLOT_ID,\"user_id\":\"$USER_ID\"}}"
          done

          FREED=$(echo "$RESPONSE" | python3 /tmp/parse_freed.py 2>/dev/null || true)

          for SLOT_ID in $FREED; do
            echo "Slot $SLOT_ID freed — checking queue"
            NEXT=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"get_next_queued\",\"internal_token\":\"${{ secrets.INTERNAL_TOKEN }}\",\"slot_id\":$SLOT_ID}")

            NEXT_USER=$(echo "$NEXT" | python3 /tmp/parse_next.py 2>/dev/null || true)

            if [ -n "$NEXT_USER" ] && [ "$NEXT_USER" != "null" ]; then
              echo "Promoting $NEXT_USER to slot $SLOT_ID"
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.GH_PAT }}" \
                -H "Accept: application/vnd.github.v3+json" \
                https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
                -d "{\"event_type\":\"assign-slot\",\"client_payload\":{\"slot_id\":$SLOT_ID,\"user_id\":\"$NEXT_USER\"}}"
            else
              echo "Queue empty — slot $SLOT_ID stays free"
            fi
          done

  notebook-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if notebook should auto-start
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"should_start_notebook\",\"internal_token\":\"${{ secrets.INTERNAL_TOKEN }}\"}")

          echo "Scheduler check: $RESPONSE"

          cat > /tmp/parse_should.py << 'PYEOF'
import sys, json
data = json.loads(sys.stdin.read())
print("true" if data.get("should_start") else "false")
PYEOF

          SHOULD=$(echo "$RESPONSE" | python3 /tmp/parse_should.py 2>/dev/null || true)
          echo "Should start: $SHOULD"

          if [ "$SHOULD" = "true" ]; then
            echo "Triggering notebook launch..."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d "{\"event_type\":\"launch-notebook\",\"client_payload\":{\"gpu_type\":\"p100\"}}"
          fi
