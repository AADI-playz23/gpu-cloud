name: Watchdog

on:
  schedule:
    - cron: '*/5 * * * *'     # every 5 minutes
  workflow_dispatch:            # manual trigger for testing

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check expired sessions and quota
        run: |
          echo "=== Watchdog tick $(date -u) ==="

          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"watchdog_tick\",
              \"internal_token\": \"${{ secrets.INTERNAL_TOKEN }}\"
            }")

          echo "Watchdog response: $RESPONSE"

          FREED=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('freed_slots',[]))")
          echo "Freed slots: $FREED"

          # For each freed slot, trigger slot-freed workflow
          echo $RESPONSE | python3 -c "
          import sys, json, subprocess
          d = json.load(sys.stdin)
          for slot_id in d.get('freed_slots', []):
              print(f'Triggering slot-freed for slot {slot_id}')
          " || true

  # ── Separate job: notebook auto-start scheduler ─────────────
  notebook-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check if notebook should start
        run: |
          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"should_start_notebook\",
              \"internal_token\": \"${{ secrets.INTERNAL_TOKEN }}\"
            }")

          SHOULD_START=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin).get('should_start', False))")
          echo "Should start notebook: $SHOULD_START"

          if [ "$SHOULD_START" = "True" ]; then
            echo "Triggering notebook boot..."
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d '{"event_type": "launch-notebook"}'
          fi
