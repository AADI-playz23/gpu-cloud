name: Slot Freed

on:
  repository_dispatch:
    types: [slot-freed]

jobs:
  promote:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Promote next user in queue
        run: |
          SLOT_ID="${{ github.event.client_payload.slot_id }}"
          echo "Slot $SLOT_ID freed — checking queue for next user"

          # Fetch next waiting user from DB
          RESPONSE=$(curl -s -X POST "${{ secrets.SITE_URL }}/queue.php" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"get_next_queued\",
              \"internal_token\": \"${{ secrets.INTERNAL_TOKEN }}\",
              \"slot_id\": $SLOT_ID
            }")

          NEXT_USER=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('user_id',''))")

          if [ -n "$NEXT_USER" ] && [ "$NEXT_USER" != "null" ]; then
            echo "Promoting user $NEXT_USER to slot $SLOT_ID"
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/AADI-playz23/gpu-cloud/dispatches \
              -d "{
                \"event_type\": \"assign-slot\",
                \"client_payload\": {
                  \"slot_id\": $SLOT_ID,
                  \"user_id\": \"$NEXT_USER\"
                }
              }"
          else
            echo "Queue is empty — slot $SLOT_ID remains free"
          fi
