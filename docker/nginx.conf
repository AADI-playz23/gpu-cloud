# NovaDev Cloud — Nginx config
# Domain: absoracode.fanclub.rocks
# Cloudflare proxies WebSocket — nginx handles upgrade headers

events { worker_connections 1024; }

http {
    # Trust Cloudflare IPs for real IP
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 2400:cb00::/32;
    real_ip_header CF-Connecting-IP;

    upstream fastapi {
        server api:8000;
    }

    server {
        listen 80;
        server_name absoracode.fanclub.rocks;

        # HTTP API routes
        location /api/ {
            proxy_pass         http://fastapi;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # WebSocket route — Cloudflare sends wss:// which arrives as ws:// here
        location /ws/ {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;

            # Required WebSocket upgrade headers
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Keep WebSocket alive through Cloudflare
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
            proxy_connect_timeout 60s;

            # Cloudflare keeps connections alive max 100s by default
            # Free Cloudflare plan: 100s timeout — client must reconnect
            # Pro plan: no timeout on WebSocket
        }

        # Frontend static files (if serving from same server)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
