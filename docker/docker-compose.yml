version: "3.9"

# NovaDev Cloud — Full stack
# Services: API, Redis, PostgreSQL, Nginx reverse proxy

networks:
  novadev-net:
    driver: bridge

volumes:
  pgdata:
  redis-data:

services:

  # ── API server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Pool manager needs Docker
    depends_on:
      - redis
      - postgres
    networks:
      - novadev-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2g"

  # ── Redis (queue backend) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - novadev-net
    command: redis-server --save 60 1 --loglevel warning

  # ── PostgreSQL (users, sessions) ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: novadev
      POSTGRES_PASSWORD: novadev
      POSTGRES_DB: novadev
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - novadev-net

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - novadev-net

  # ── Notebook container template (free) ─────────────────────────────────────
  # Not started by compose — DockerPool spawns these dynamically.
  # This block is here for build reference only.
  notebook-free:
    build:
      context: ./docker/notebook-free
    image: novadev/notebook-free:latest
    profiles:
      - build-only

  # ── Notebook container template (paid) ─────────────────────────────────────
  notebook-paid:
    build:
      context: ./docker/notebook-paid
    image: novadev/notebook-paid:latest
    profiles:
      - build-only
